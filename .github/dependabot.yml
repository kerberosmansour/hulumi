# Dependabot — v1.0.0 (M5).
# Pulumi cooling-off (72h minor/major, 24h patch) is enforced by
# .github/workflows/pulumi-cooling-off.yml on every PR — Dependabot
# proposes the bump, the cooling-off CI gate decides whether the PR
# can merge. @pulumi/* deps are grouped so a coherent bump stays
# atomic across the six Hulumi packages.
#
# Major-version bumps on the toolchain below are conscious migrations with
# code-level fallout (e.g. TypeScript 6's moduleResolution=node10
# deprecation, ESLint 10's flat-config tightening, Vitest 4's runtime
# changes). Keep them out of Dependabot's auto-PR stream until an explicit
# upgrade window — the list is small enough to revisit during M5.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Native 72h cooldown (anti-supply-chain): don't even open a PR until a
    # release is 3 days old. Complements the pulumi-cooling-off CI gate (which
    # also blocks merge until cooled). Security updates bypass cooldown.
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    # Group @pulumi/* together so cooling-off stays atomic across the
    # six Hulumi packages; group remaining dev deps for noise control.
    groups:
      pulumi-runtime:
        patterns:
          - "@pulumi/*"
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "@pulumi/*"
    ignore:
      # Toolchain majors stay out of auto-PRs. Minor/patch flow normally.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/eslint-plugin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/parser"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prettier"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 3
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/tools/sca"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "sca"
    groups:
      sca-brain-toolchain:
        patterns:
          - "*"
