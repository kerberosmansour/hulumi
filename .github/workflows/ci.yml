name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:exact-pin-guard
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r lint
      - run: pnpm run lint:license-boundary
      - run: pnpm run format:check

  baseline-test:
    name: "@hulumi/baseline unit tests (mocks only)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/baseline build
      - run: pnpm run test:baseline

  policies-test:
    name: "@hulumi/policies unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/policies build
      - run: pnpm run test:policies

  examples-typecheck:
    name: "examples/* typecheck (mocks only)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/baseline build
      - run: pnpm --filter @hulumi-examples/secure-bucket-smoke typecheck
      - run: pnpm --filter @hulumi-examples/secure-bucket-smoke test

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check DCO sign-off on every commit in the PR
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          MISSING=$(git log --format='%H %s' "$BASE_SHA..$HEAD_SHA" | while read sha _; do
            git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+' || echo "$sha"
          done)
          if [ -n "$MISSING" ]; then
            echo "::error::The following commits lack a Signed-off-by trailer (DCO):"
            echo "$MISSING"
            exit 1
          fi
          echo "All commits carry DCO sign-off."
