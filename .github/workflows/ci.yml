name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:exact-pin-guard
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r lint
      - run: pnpm run lint:license-boundary
      - run: pnpm run format:check

  baseline-test:
    name: "@hulumi/baseline unit tests (mocks only)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/baseline build
      - run: pnpm run test:baseline

  policies-test:
    name: "@hulumi/policies unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/policies build
      - run: pnpm run test:policies

  examples-typecheck:
    name: "examples/* typecheck (mocks only)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/baseline build
      - run: pnpm --filter @hulumi-examples/secure-bucket-smoke typecheck
      - run: pnpm --filter @hulumi-examples/secure-bucket-smoke test
      - run: pnpm --filter @hulumi-examples/account-foundation-smoke typecheck
      - run: pnpm --filter @hulumi-examples/account-foundation-smoke test
      - run: pnpm --filter @hulumi/drift build
      - run: pnpm --filter @hulumi-examples/drift-classify-smoke typecheck
      - run: pnpm --filter @hulumi-examples/drift-classify-smoke test
      - run: pnpm --filter @hulumi/cloudflare-baseline build
      - run: pnpm --filter @hulumi/platform-patterns build
      - run: pnpm --filter @hulumi/policies build
      - run: pnpm --filter @hulumi/example-edge-platform-smoke typecheck
      - run: pnpm --filter @hulumi/example-edge-platform-smoke test

  k8s-baseline-test:
    name: "@hulumi/k8s-baseline unit + release-readiness BDD"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/k8s-baseline build
      - run: pnpm --filter @hulumi/k8s-baseline test
      # Integration lanes (kind/EKS) skip cleanly without flags; running
      # them in CI proves the gating shape is wired up correctly.
      - run: pnpm --filter @hulumi/k8s-baseline run test:integration:kind
      - run: pnpm --filter @hulumi/k8s-baseline run test:integration:eks

  account-foundation-mocks:
    name: "@hulumi/baseline AccountFoundation mocks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/baseline build
      - run: pnpm --filter @hulumi/baseline test -- tests/account-foundation.test.ts

  cis-v5-pack-tests:
    name: "@hulumi/policies CisV5Pack tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/policies build
      - run: pnpm --filter @hulumi/policies test -- tests/cis-v5-pack.test.ts

  drift-mocks:
    name: "@hulumi/drift mocks (verdict matrix + 6 security BDDs + TLA+ alignment)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @hulumi/drift build
      - run: pnpm run test:drift

  pulumi-cooling-off:
    name: pulumi cooling-off (72h minor/major / 24h patch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - name: Diff lockfile + check cooling-off
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git show "$BASE_SHA:pnpm-lock.yaml" > /tmp/base-lock.yaml || echo "" > /tmp/base-lock.yaml
          node scripts/cooling-off-diff.mjs /tmp/base-lock.yaml pnpm-lock.yaml

  release-artifacts-dry-run:
    name: release artifact dry-run (PR, no OIDC)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Build tarballs (dry-run, no publish)
        run: |
          mkdir -p .release-artifacts
          ABS_DEST="$(pwd)/.release-artifacts"
          for pkg in baseline policies drift k8s-baseline cloudflare-baseline platform-patterns; do
            (cd "packages/$pkg" && pnpm pack --pack-destination "$ABS_DEST")
          done
          ls -la .release-artifacts/

  attestation-dry-run:
    name: SLSA attestation dry-run (pre-tag)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Build tarballs (dry-run, no publish)
        run: |
          mkdir -p .release-artifacts
          ABS_DEST="$(pwd)/.release-artifacts"
          for pkg in baseline policies drift k8s-baseline cloudflare-baseline platform-patterns; do
            (cd "packages/$pkg" && pnpm pack --pack-destination "$ABS_DEST")
          done
          ls -la .release-artifacts/
      - name: Attest provenance (dry-run; not consumed)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: ".release-artifacts/*.tgz"

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check DCO sign-off on every commit in the PR
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          MISSING=$(git log --format='%H %s' "$BASE_SHA..$HEAD_SHA" | while read sha _; do
            git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+' || echo "$sha"
          done)
          if [ -n "$MISSING" ]; then
            echo "::error::The following commits lack a Signed-off-by trailer (DCO):"
            echo "$MISSING"
            exit 1
          fi
          echo "All commits carry DCO sign-off."
