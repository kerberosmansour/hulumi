name: dependabot-automerge

# Track B auto-merge for Hulumi. Aged minor/patch Dependabot PRs merge
# themselves once all required checks pass (incl. test+typecheck+lint, the
# @hulumi/* suites, DCO, and pulumi cooling-off). Majors and toolchain bumps
# are not auto-merged (they're either ignored in dependabot.yml or open as PRs
# for a human). `--auto --squash` matches the hulumi-main-protection ruleset
# (squash-only, no review required); the ruleset's required checks gate the merge.

on: pull_request

permissions:
  contents: read

jobs:
  dependabot-automerge:
    name: dependabot-automerge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.actor == 'dependabot[bot]' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Dependabot branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Refresh exact-pin guard for Dependabot lockfile updates
        run: node scripts/exact-pin-guard.mjs --write

      - name: Commit refreshed exact-pin guard when needed
        run: |
          if git diff --quiet -- scripts/exact-pin-guard.mjs; then
            echo "exact-pin guard already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/exact-pin-guard.mjs
          git commit -s -m "chore(deps): refresh exact-pin guard for Dependabot"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for aged minor/patch updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Leave a note when a major update needs a human
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: echo "Major update (${{ steps.meta.outputs.dependency-names }}) — not auto-merging; left for human review."
