name: dependency-review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/sca/package-lock.json

      - name: Install SCA brain
        run: npm ci --prefix tools/sca

      - name: Portable dependency review
        run: tools/sca/node_modules/.bin/tsx tools/sca/src/cli/dependency-review.ts
