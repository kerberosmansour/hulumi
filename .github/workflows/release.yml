# Release — atomic four-package npm publish with SLSA Build L3
# attestation + SBOM generation + signed GitHub release.
#
# Trigger: tag v*.*.* on main. The release is atomic — any step
# failure aborts before any `npm publish`.
#
# Auth model — TEMPORARY DURING v1.2.0 BOOTSTRAP:
# npm Trusted Publishing (OIDC) cannot be configured for a package
# that does not yet exist on the registry. v1.2.0 is the FIRST publish
# of @hulumi/{baseline,policies,drift,k8s-baseline}, so we use a
# short-lived granular access token (`secrets.NPM_TOKEN`) for ONE
# release run only. Immediately after v1.2.0 ships, Trusted Publisher
# is configured per package, this token is revoked, and the
# `NODE_AUTH_TOKEN` env block + the secret are removed via the revert
# PR. From v1.2.1 onward the auth model returns to OIDC-only with no
# long-lived token in CI.
#
# The four-package set is asserted by
# packages/k8s-baseline/tests/release-readiness.test.ts:
#   - @hulumi/baseline
#   - @hulumi/policies
#   - @hulumi/drift
#   - @hulumi/k8s-baseline   (added in runbook hulumi-operations-k8s-security M1)

name: release
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  preflight:
    name: pre-flight (build + test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:exact-pin-guard
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r lint
      - run: pnpm run lint:license-boundary
      - run: pnpm run format:check

  attest-and-publish:
    name: SLSA attest + npm publish (atomic)
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
        with:
          version: 9.12.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - name: Generate tarballs
        run: |
          mkdir -p .release-artifacts
          ABS_DEST="$(pwd)/.release-artifacts"
          for pkg in baseline policies drift k8s-baseline; do
            (cd "packages/$pkg" && pnpm pack --pack-destination "$ABS_DEST")
          done
          ls -la .release-artifacts/

      - name: Generate SBOMs (CycloneDX, via cdxgen)
        # cdxgen is the multi-package-manager CycloneDX generator. It reads
        # `pnpm-lock.yaml` natively, so no transient `package-lock.json`
        # round-trip is needed. The previous fix (`npm install
        # --package-lock-only`) was intercepted by Corepack — when the
        # workspace's `package.json#packageManager` is `pnpm@9.12.0`,
        # Corepack rejects or rewrites direct npm calls, so the lockfile
        # never got created and `@cyclonedx/cyclonedx-npm` errored with
        # "No evidence: no package lock file nor `node_modules` dir".
        # Switching to cdxgen sidesteps the Corepack interaction
        # entirely.
        env:
          # cdxgen reads `pnpm-lock.yaml` from the workspace root and
          # the package.json from the per-package directory. Run from
          # the repo root so pnpm-lock.yaml is discoverable.
          FETCH_LICENSE: "true"
        run: |
          set -euo pipefail
          for pkg in baseline policies drift k8s-baseline; do
            npx --yes @cyclonedx/cdxgen@11 \
              --type js \
              --no-recurse \
              --spec-version 1.5 \
              --output ".release-artifacts/sbom-${pkg}.cdx.json" \
              "packages/$pkg"
          done

      - name: Attest provenance for tarballs
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: ".release-artifacts/*.tgz"

      - name: npm publish (atomic — any failure aborts before subsequent publishes)
        # REMOVE AFTER v1.2.0 BOOTSTRAP: the `env:` block below wires
        # `secrets.NPM_TOKEN` (a short-lived granular access token,
        # scoped to @hulumi/* read+write, 7-day expiry) for the first
        # publish only. npm Trusted Publishing requires the package to
        # already exist on the registry — see the file-level comment
        # at the top of this workflow for the full rationale. The
        # revert PR (`chore/release-bootstrap-token-revert`) removes
        # this block immediately after v1.2.0 ships and Trusted
        # Publisher is configured per package on npmjs.com.
        run: |
          set -euo pipefail
          pnpm --filter @hulumi/baseline publish --no-git-checks --provenance --access public
          pnpm --filter @hulumi/policies publish --no-git-checks --provenance --access public
          pnpm --filter @hulumi/drift publish --no-git-checks --provenance --access public
          pnpm --filter @hulumi/k8s-baseline publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release with SBOMs + tarballs
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            .release-artifacts/*.tgz
            .release-artifacts/sbom-*.cdx.json
          generate_release_notes: true
          fail_on_unmatched_files: true
