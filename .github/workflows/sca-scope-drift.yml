name: sca-scope-drift

on:
  schedule:
    - cron: "0 6 * * 1,4"
  # Required by hulumi-main-protection, so it must report on every PR. Keep
  # filtering inside the SCA command instead of using workflow path filters.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sca-scope-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scope-drift:
    name: scope-drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/sca/package-lock.json

      - name: Install SCA brain
        run: npm ci --prefix tools/sca

      - name: Run scope-sync (read-only; fails on unclassified drift)
        run: |
          tools/sca/node_modules/.bin/tsx tools/sca/src/cli/scope-sync.ts scope-sync \
            --scope sca-scope.json \
            --report .cache/sca-scope-drift.json \
            --apply false

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sca-scope-drift-report
          path: .cache/sca-scope-drift.json
          if-no-files-found: warn
          retention-days: 7
