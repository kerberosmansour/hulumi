# Reusable release signing lane.
#
# Called by release.yml after the build job has produced tarballs, SBOMs,
# and tarballs-sha256.txt without `id-token: write`. This workflow owns the
# OIDC-backed signing/publish step so user-controlled build commands do not
# share a runner with the provenance-signing permission.

name: sign-and-publish

on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
      package-list:
        required: true
        type: string

permissions:
  contents: read

jobs:
  sign-and-publish:
    name: attest tarballs, publish npm packages, create release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download prebuilt release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: .release-artifacts

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Use npm CLI with trusted publishing OIDC support
        run: |
          npm install -g npm@11.5.1
          node --version
          npm --version

      - name: Verify release artifact digest manifest
        env:
          PACKAGE_LIST: ${{ inputs.package-list }}
        run: |
          set -euo pipefail
          test -f .release-artifacts/tarballs-sha256.txt
          sha256sum --check .release-artifacts/tarballs-sha256.txt
          for pkg in $PACKAGE_LIST; do
            tarball="$(find .release-artifacts -maxdepth 1 -type f -name "hulumi-${pkg}-*.tgz" -print -quit)"
            test -n "$tarball"
            test -f ".release-artifacts/sbom-${pkg}.cdx.json"
          done

      - name: Attest provenance for tarballs
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ".release-artifacts/*.tgz"

      - name: npm publish (atomic — any failure aborts before subsequent publishes)
        env:
          PACKAGE_LIST: ${{ inputs.package-list }}
        run: |
          set -euo pipefail
          for pkg in $PACKAGE_LIST; do
            tarball="$(find .release-artifacts -maxdepth 1 -type f -name "hulumi-${pkg}-*.tgz" -print -quit)"
            test -n "$tarball"
            npm publish "$tarball" --provenance --access public
          done

      - name: Create GitHub release with SBOMs + tarballs
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            .release-artifacts/*.tgz
            .release-artifacts/sbom-*.cdx.json
          generate_release_notes: true
          fail_on_unmatched_files: true
